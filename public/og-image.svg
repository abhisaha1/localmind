<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg { fill: #0f0f23; }
      .hex { 
        fill: #6366f1; 
        font-family: system-ui, -apple-system, sans-serif; 
        font-size: 120px; 
        text-anchor: middle; 
        dominant-baseline: central; 
      }
      .title {
        fill: #ffffff;
        font-family: 'Syne', system-ui, sans-serif;
        font-size: 48px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .subtitle {
        fill: #9ca3af;
        font-family: 'IBM Plex Mono', monospace;
